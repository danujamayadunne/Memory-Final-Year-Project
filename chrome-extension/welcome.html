<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Memory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      font-weight: bold;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .features {
      text-align: left;
      margin: 32px 0;
    }

    .feature {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      font-size: 16px;
    }

    .feature-icon {
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
      border: 2px solid rgba(255, 255, 255, 0.3);
      margin: 8px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: white;
      color: #667eea;
    }

    .btn-primary:hover {
      background: #f8f9fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>Welcome to Memory</h1>
    <p>Your personal web summarizer and knowledge management tool</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>Instantly summarize any web page</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>AI-powered content analysis</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>Organize with smart tags</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>Build your knowledge base</span>
      </div>
    </div>

    <div>
      <a href="http://localhost:3000/auth/signup" class="btn btn-primary">Get Started</a>
      <a href="http://localhost:3000/auth/login" class="btn">Sign In</a>
    </div>
  </div>
</body>
</html>
