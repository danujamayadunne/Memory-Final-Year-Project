<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 420px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #000;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: #fff;
    }
    .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    .header-text p { font-size: 13px; color: #666; margin-top: 2px; font-weight: 500; }
    .content { padding: 20px 24px 24px; }
    .section { display: none; }
    .section.active { display: block; }
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn:hover { transform: scale(1.01); }
    .btn:active { transform: scale(0.99); }
    .btn-primary {
      background: #000;
      color: #fff;
    }
    .btn-secondary {
      background: #e5e5e5;
      color: #000;
      margin-top: 10px;
    }
    .btn-secondary:hover { background: #d4d4d4; }
    .btn-ghost {
      background: rgba(0,0,0,0.06);
      color: #666;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      width: auto;
      flex-shrink: 0;
    }
    .btn-ghost:hover { background: rgba(0,0,0,0.1); color: #000; }
    .login-intro {
      text-align: center;
      padding: 8px 0 24px;
      color: #666;
      font-size: 15px;
      line-height: 1.5;
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: #fff;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-info strong { display: block; font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-info span { font-size: 13px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; margin-top: 2px; }
    .url-card {
      padding: 14px 16px;
      background: #fff;
      border-radius: 12px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .url-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .loading {
      text-align: center;
      padding: 48px 0;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 15px; color: #666; font-weight: 500; }
    .success {
      text-align: center;
      padding: 32px 0;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: #000;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-weight: 700;
      font-size: 28px;
    }
    .success h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
    .success p { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
    .error {
      padding: 12px 16px;
      background: rgba(0,0,0,0.08);
      color: #000;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .shortcut-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      margin-top: 14px;
      font-weight: 500;
    }
    .shortcut-badge kbd {
      padding: 2px 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
    }
    .format-selector {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.06);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .format-option {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #666;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .format-option:hover { color: #000; }
    .format-option.active {
      background: #fff;
      color: #000;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>Memory</h1>
      <p>Web Summarizer</p>
    </div>
  </div>
  <div class="content">
    <div id="loginSection" class="section">
      <p class="login-intro">Sign in to save and summarize any web page to your knowledge base.</p>
      <button id="loginBtn" class="btn btn-primary">Sign In</button>
      <button id="signupBtn" class="btn btn-secondary">Create Account</button>
    </div>
    <div id="summarySection" class="section">
      <div class="user-card">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-info">
          <strong id="userName">User</strong>
          <span id="userEmail">user@example.com</span>
        </div>
        <button id="logoutBtn" class="btn btn-ghost">Logout</button>
      </div>
      <div class="url-card">
        <div class="url-label">Current Page</div>
        <div id="siteUrl">Loading...</div>
      </div>
      <div class="format-selector">
        <button type="button" class="format-option active" data-format="bullets">Bullets</button>
        <button type="button" class="format-option" data-format="paragraph">Paragraph</button>
      </div>
      <div id="errorMessage" class="error"></div>
      <button id="addToMemoryBtn" class="btn btn-primary">Add to Memory</button>
      <div class="shortcut-badge">
        <span>Shortcut</span>
        <kbd id="shortcutKeys">⌘⇧K</kbd>
      </div>
    </div>
    <div id="loadingSection" class="section">
      <div class="loading">
        <div class="spinner"></div>
        <p id="loadingText">Loading...</p>
      </div>
    </div>
    <div id="successSection" class="section">
      <div class="success">
        <div class="success-icon">✓</div>
        <h3>Added to Memory</h3>
        <p>This page has been summarized and saved to your knowledge base.</p>
        <button id="viewMemoryBtn" class="btn btn-secondary">View in Memory</button>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
