<!DOCTYPE html>
<html>
<head>
    <title>Generate Icons</title>
</head>
<body>
    <canvas id="canvas" width="128" height="128"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Create SVG element
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '128');
        svg.setAttribute('height', '128');
        svg.setAttribute('viewBox', '0 0 128 128');
        
        // Add background
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', '128');
        rect.setAttribute('height', '128');
        rect.setAttribute('rx', '24');
        rect.setAttribute('fill', '#3B82F6');
        svg.appendChild(rect);
        
        // Add white card
        const card = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        card.setAttribute('d', 'M32 40C32 35.5817 35.5817 32 40 32H88C92.4183 32 96 35.5817 96 40V88C96 92.4183 92.4183 96 88 96H40C35.5817 96 32 92.4183 32 88V40Z');
        card.setAttribute('fill', 'white');
        svg.appendChild(card);
        
        // Add lines
        const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line1.setAttribute('d', 'M48 56H80V64H48V56Z');
        line1.setAttribute('fill', '#3B82F6');
        svg.appendChild(line1);
        
        const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line2.setAttribute('d', 'M48 68H72V76H48V68Z');
        line2.setAttribute('fill', '#3B82F6');
        svg.appendChild(line2);
        
        const line3 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line3.setAttribute('d', 'M48 80H76V88H48V80Z');
        line3.setAttribute('fill', '#3B82F6');
        svg.appendChild(line3);
        
        // Add circle
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', '64');
        circle.setAttribute('cy', '48');
        circle.setAttribute('r', '4');
        circle.setAttribute('fill', '#3B82F6');
        svg.appendChild(circle);
        
        // Convert SVG to image and draw on canvas
        const svgData = new XMLSerializer().serializeToString(svg);
        const img = new Image();
        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            
            // Generate different sizes
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(canvas, 0, 0, size, size);
                
                // Download
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = tempCanvas.toDataURL();
                link.click();
            });
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
    </script>
</body>
</html>
