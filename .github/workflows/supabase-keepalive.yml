name: Supabase keepalive

on:
  schedule:
    - cron: "0 14 */5 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake project (Auth health)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::error::Missing secret SUPABASE_URL (e.g. https://xxxx.supabase.co)"
            exit 1
          fi
          # Trim accidental newlines/spaces from secret paste
          url="$(printf '%s' "$SUPABASE_URL" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          base="${url%/}"
          code="$(curl -sS -o /dev/null -w "%{http_code}" "${base}/auth/v1/health")"
          echo "GET ${base}/auth/v1/health → HTTP ${code}"
          case "$code" in
            2??) exit 0 ;;
            *)
              echo "::error::Unexpected HTTP status: ${code}"
              exit 1
              ;;
          esac
