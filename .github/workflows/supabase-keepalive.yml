name: Supabase keepalive

on:
  schedule:
    - cron: "0 14 */5 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake project (REST)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing secrets. Add SUPABASE_URL and SUPABASE_ANON_KEY to repository Actions secrets."
            exit 1
          fi
          base="${SUPABASE_URL%/}"
          code="$(curl -sS -o /dev/null -w "%{http_code}" \
            "${base}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")"
          echo "GET ${base}/rest/v1/ → HTTP ${code}"
          case "$code" in
            2??|404) exit 0 ;;
            *)
              echo "::error::Unexpected HTTP status: ${code}"
              exit 1
              ;;
          esac